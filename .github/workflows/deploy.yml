name: Deploy Backend

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to the backend directory on your VPS
            cd /root/cloudcode/backend # <-- Update this path to your actual project path on DigitalOcean
            
            # Pull latest changes from git
            git pull origin main
            
            # Install dependencies and build Next.js backend
            npm install
            npm run build
            
           
            pm2 restart cloudcode-backend 